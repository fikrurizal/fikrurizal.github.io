  site-url: "https://fikrurizal.github.io"
  repo-url: "https://github.com/fikrurizal/fikrurizal.github.io"
  favicon: "assets/images/favicon.ico"
  navbar:
    title: "M. Fikru Rizal"
    left:
      - text: "Home"
        href: index.qmd
      - text: "CV"
        href: cv.qmd
      - text: "Research"
        href: research.qmd
      - text: "Notes"
        href: notes.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: github
        href: "https://github.com/fikrurizal"
        aria-label: "GitHub"
      - icon: linkedin
        href: "https://www.linkedin.com/in/muhammad-fikru-rizal-066a3081/"
        aria-label: "LinkedIn"
      - icon: twitter-x
        href: "https://twitter.com/fikrurizal"
