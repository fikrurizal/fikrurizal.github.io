    toc-depth: 2
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    include-in-header:
      text: |
        <meta name="description" content="Personal academic website of M. Fikru Rizal, Research Fellow in the Health Economics Group at Monash University.">

execute:
  freeze: auto
